<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<button onclick="toggleMode()" id="modeBtn">🌙 Dark Mode</button>
<title>Password Generator</title>
</head>

<body>

<h2>Password Generator 🔐</h2>

<style>
.dark {
    background-color: #121212;
    color: white;
}

.dark .container {
    background: #1e1e1e;
}
</style>

  

<input type="number" id="length" placeholder="Length (8-20)" min="8" max="20">

<br><br>

<label><input type="checkbox" id="uppercase"> Uppercase</label><br>
<label><input type="checkbox" id="numbers"> Numbers</label><br>
<label><input type="checkbox" id="symbols"> Special Characters</label><br><br>

<button onclick="generatePassword()">Generate Password</button>
<button onclick="copyPassword()">Copy</button>

<p id="generatedPassword"></p>


<script>
  function toggleMode() {
    document.body.classList.toggle("dark");

    let btn = document.getElementById("modeBtn");

    if (document.body.classList.contains("dark")) {
        btn.innerText = "☀️ Light Mode";
    } else {
        btn.innerText = "🌙 Dark Mode";
    }
}
</script>


<script>
function generatePassword() {
    let length = document.getElementById("length").value;
    let uppercase = document.getElementById("uppercase").checked;
    let numbers = document.getElementById("numbers").checked;
    let symbols = document.getElementById("symbols").checked;

    let chars = "abcdefghijklmnopqrstuvwxyz";

    if (uppercase) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if (numbers) chars += "0123456789";
    if (symbols) chars += "!@#$%^&*";

    let password = "";

    for (let i = 0; i < length; i++) {
        let randomIndex = Math.floor(Math.random() * chars.length);
        password += chars[randomIndex];
    }

    document.getElementById("generatedPassword").innerText = password;

    // Auto strength check (if input exists)
    let inputBox = document.getElementById("password");
    if (inputBox) {
        inputBox.value = password;
        checkPassword();
    }
}

function copyPassword() {
    let password = document.getElementById("generatedPassword").innerText;
    navigator.clipboard.writeText(password);
    alert("Password copied! 📋");
}
</script>



</body>
</html>
