<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Strength Checker</title>

    <style>
       body {
    background-color: #f4f4f4;
    font-family: Arial;
    text-align: center;
}


        input {
            padding: 10px;
            font-size: 16px;
            width: 250px;
        }

        button {
            padding: 6px 10px;
            cursor: pointer;
        }

        #rules {
            list-style: none;
            padding: 0;
        }

        #rules li {
            margin: 5px;
            font-size: 16px;
        }
    </style>
    
  
    
<style>
.container {
    background: white;
    padding: 20px;
    width: 300px;
    margin: 50px auto;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}
</style>
</head>

<body>


<div class="container">
    <h1>Password Strength Checker 🔐</h1>

    <div style="display:flex; justify-content:center; gap:10px;">
        <input type="password" id="password" placeholder="Enter password" oninput="checkPassword()">
        <button onclick="togglePassword()" id="eyeBtn">👁️</button>
    </div>
    

    <p id="result"></p>
<p>Check your password security in real-time</p>
    <ul id="rules">
        <li id="length">❌ At least 8 characters</li>
        <li id="upper">❌ One uppercase letter</li>
        <li id="number">❌ One number</li>
        <li id="special">❌ One special character</li>
    </ul>

    <p id="suggestion"></p>

    <script>
        function checkPassword() {
            let password = document.getElementById("password").value;
            let result = document.getElementById("result");
            let suggestion = document.getElementById("suggestion");

            let strength = 0;

            let length = document.getElementById("length");
            let upper = document.getElementById("upper");
            let number = document.getElementById("number");
            let special = document.getElementById("special");

            if (password.length >= 8) {
                length.innerHTML = "✅ At least 8 characters";
                length.style.color = "green";
                strength++;
            } else {
                length.innerHTML = "❌ At least 8 characters";
                length.style.color = "red";
            }

            if (/[A-Z]/.test(password)) {
                upper.innerHTML = "✅ One uppercase letter";
                upper.style.color = "green";
                strength++;
            } else {
                upper.innerHTML = "❌ One uppercase letter";
                upper.style.color = "red";
            }

            if (/[0-9]/.test(password)) {
                number.innerHTML = "✅ One number";
                number.style.color = "green";
                strength++;
            } else {
                number.innerHTML = "❌ One number";
                number.style.color = "red";
            }

            if (/[!@#$%^&*]/.test(password)) {
                special.innerHTML = "✅ One special character";
                special.style.color = "green";
                strength++;
            } else {
                special.innerHTML = "❌ One special character";
                special.style.color = "red";
            }

            if (strength <= 1) {
                result.innerHTML = "Weak Password ❌";
                result.style.color = "red";

                suggestion.innerHTML = "👉 Use at least 8 characters, uppercase, number & special character";
                suggestion.style.color = "red";
            } 
            else if (strength <= 3) {
                result.innerHTML = "Medium Password ⚠️";
                result.style.color = "orange";

                suggestion.innerHTML = "👉 Add more security like special characters or uppercase letters";
                suggestion.style.color = "orange";
            } 
            else {
                result.innerHTML = "Strong Password ✅";
                result.style.color = "green";

                suggestion.innerHTML = "✅ Your password is strong!";
                suggestion.style.color = "green";
            }
        }

        function togglePassword() {
            let input = document.getElementById("password");
            let btn = document.getElementById("eyeBtn");

            if (input.type === "password") {
                input.type = "text";
                btn.innerHTML = "🙈";
            } else {
                input.type = "password";
                btn.innerHTML = "👁️";
            }
        }
    </script>

</body>
</html>
